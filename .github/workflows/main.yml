name: 🚀 Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        lfs: true
    
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then 
          pip install -r requirements.txt
        fi
    
    - name: 🔍 Validate app
      run: |
        python -c "import app; print('✅ App loaded successfully')" || echo "⚠️ App may have issues"
    
    - name: 🚀 Push to Hugging Face Spaces
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_USERNAME: ${{ secrets.HF_USERNAME }}
        HF_SPACE: ${{ secrets.HF_SPACE_NAME }}
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        
        # إذا لم تحدد secrets، استخدم القيم الافتراضية
        HF_USERNAME=${HF_USERNAME:-"your-username"}
        HF_SPACE=${HF_SPACE:-"patient-deterioration-predictor"}
        
        # إضافة Remote مع التوكن
        git remote add hf https://x-token-auth:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE
        
        # دفع التغييرات
        git push --force hf main
        
        echo "✅ Successfully deployed to: https://huggingface.co/spaces/$HF_USERNAME/$HF_SPACE"
    
    - name: ✅ Success notification
      if: success()
      run: echo "🎉 Deployment completed successfully!"
    
    - name: ❌ Failure notification
      if: failure()
      run: echo "❌ Deployment failed. Check logs for details."
