name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Remove binary file from Git history
        run: |
          git filter-branch --force --index-filter \
            "git rm --cached --ignore-unmatch 'model_artifacts (1).pkl'" \
            --prune-empty --tag-name-filter cat -- --all
          git for-each-ref --format="%(refname)" refs/original/ | xargs -n 1 git update-ref -d
          git reflog expire --expire=now --all
          git gc --aggressive --prune=now

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote add hf https://x-token-auth:$HF_TOKEN@huggingface.co/spaces/EngReem85/patient-deterioration-prediction
          git push --force hf main
